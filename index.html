<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Joc Puzzle Simplu - Kusnirenco</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Joc Puzzle Simplu</h1>
    <p>Aranjează numerele în ordine crescătoare!</p>
    
    <div class="controls">
      <label>Dificultate: 
        <select id="size">
          <option value="3">3×3</option>
          <option value="4" selected>4×4</option>
          <option value="5">5×5</option>
        </select>
      </label>
      <button id="newGame">Joc nou</button>
    </div>

    <canvas id="canvas" width="480" height="480"></canvas>

    <div id="message">Felicitări! Ai câștigat! 🎉</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
